<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0b0c10"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(99,102,241,0.06)" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Accent circle glow -->
  <circle cx="960" cy="315" r="260" fill="none" stroke="rgba(139,92,246,0.08)" stroke-width="60"/>
  <circle cx="960" cy="315" r="160" fill="rgba(99,102,241,0.04)"/>

  <!-- Left content block -->
  <!-- Label -->
  <text x="80" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" letter-spacing="4" fill="rgba(148,163,184,0.7)" text-transform="uppercase">PORTFOLIO</text>

  <!-- Name -->
  <text x="80" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" letter-spacing="-2" fill="url(#name-grad)" filter="url(#glow)">AJAY K J</text>

  <!-- Role -->
  <text x="80" y="378" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="500" fill="rgba(226,232,240,0.85)">Senior Software Engineer</text>

  <!-- Divider -->
  <rect x="80" y="410" width="120" height="3" rx="2" fill="url(#name-grad)"/>

  <!-- Tags -->
  <text x="80" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(148,163,184,0.7)">Angular · TypeScript · Frontend · Kerala, India</text>

  <!-- URL -->
  <text x="80" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="rgba(99,102,241,0.8)">ajaykj.vercel.app</text>
</svg>
